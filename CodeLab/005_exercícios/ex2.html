<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ex2</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        height: 100dvh;
        display: grid;
        grid-template-rows: 1fr 2fr 1fr;
      }

      #page {
        display: grid;
        grid-template-columns: 1fr 3fr;
      }

      header {
        background-color: red;
      }

      #sidenav {
        background-color: blue;
      }

      #content {
        background-color: green;
      }

      footer {
        background-color: yellow;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Header</h1>
    </header>
    <div id="page">
      <div id="sidenav">
        <h2>Sidenav</h2>
      </div>
      <div id="content">
        <h2>CodeLab o grupo do amor</h2>
        <img
          src="https://icmc.usp.br/imprensa/5584/_thumb1/guia-mostra-que-cursos-do-icmc-estao-entre-os-melhores-do-pais.jpg"
          alt="icmc"
        />
      </div>
    </div>
    <footer><h2>Footer</h2></footer>
  </body>
</html>
