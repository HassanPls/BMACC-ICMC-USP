<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercício 3</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      h1 {
        text-align: center;
        width: 100%;
        background-color: bisque;
        padding: 10px;
      }
      img {
        border: 5px dashed black;
        padding: 10px;
        margin: 10px;
      }
      #description {
        margin: 10px;
        padding: 10px;
        text-align: center;
        border: 3px solid bisque;
      }
      #dog {
        display: flex;
        justify-content: center;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <h1>Meu cachorro</h1>
    <div id="dog">
      <img
        src="https://tse2.mm.bing.net/th/id/OIP.dJwMdPwp7jiNjdwmAaDMjwHaE8?rs=1&pid=ImgDetMain&o=7&rm=3"
        alt="cachorro"
      />

      <div id="description">
        <p>
          Lições do melhor amigo. <br />Se um cachorro fosse seu você aprenderia
          habilidades assim:
        </p>
        <p>
          - ser mansinho <br />
          - cuidar dos seus irmãos (cobra do tamanho do universo e cavalo de 6
          pernas) <br />
          - ser um bom filho de um metade deus e metade titã
        </p>
      </div>
    </div>
  </body>
</html>
