<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ex2</title>
</head>
<body>
    <script>
        let numbers = [];

        for (let i = 0; i < 10; i++) {
            numbers.push(i + 1);
        }
        console.log(numbers);

        for (let i = numbers.length - 1; i >= 0; i--) {
            if (numbers[i] % 2 == 0) {
                numbers.splice(i, 1);
            }
        }
        console.log(numbers);
    </script>
</body>
</html>
